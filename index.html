<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>欢迎回家 - 群芳阁导航发布页</title>
    <style>
        body { background-color: #1a1a1a; color: #ffffff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; box-sizing: border-box; }
        .container { background-color: #242424; border-radius: 12px; width: 100%; max-width: 600px; padding: 30px; box-sizing: border-box; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); }
        .header-title { font-size: 24px; font-weight: bold; color: #ff6b4a; margin-bottom: 10px; text-align: center; }
        .header-subtitle { color: #a0a0a0; font-size: 14px; margin-bottom: 25px; text-align: center; }
        .alert-box { text-align: left; padding: 15px; border-radius: 8px; margin-bottom: 15px; font-size: 13px; line-height: 1.5; background-color: #2a2a2a; border-left: 4px solid #444; }
        .btn { display: block; width: 100%; padding: 14px; margin-bottom: 12px; border-radius: 8px; text-decoration: none; font-weight: bold; text-align: center; border: none; cursor: pointer; }
        .btn-save { background: #ff5722; color: #fff; }
        .btn-main { background: #e91e63; color: #fff; }
        .btn-ultimate { background: #2e7d32; color: #fff; }
        .btn-row { display: flex; gap: 10px; }
        .btn-tg { flex: 1; background-color: #0088cc; color: #fff; padding: 14px; border-radius: 8px; text-align: center; text-decoration: none; font-weight: bold; }
        .btn-x { flex: 1; background-color: #000; border: 1px solid #333; color: #fff; padding: 14px; border-radius: 8px; text-align: center; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-title">🎉 欢迎回家</div>
        <div class="header-subtitle">请妥善保存本页，防止失联。</div>
        
        <div class="alert-box">💡 建议保存本文件到桌面，双击即可直接打开。</div>

        <button onclick="downloadHtml()" class="btn btn-save">💾 一键保存本页防失联</button>
        <a href="https://vip.qunfangs.com" class="btn btn-main" target="_blank">🚀 极速主站直连通道</a>
        <!-- 已移除指向自身的循环链接，改为指向 GitHub 主页 -->
        <a href="https://github.com/jack0978" class="btn btn-ultimate" target="_blank">🛡️ 官方仓库发布页</a>
        
        <div class="btn-row">
            <a href="https://t.me/qunfangS" class="btn btn-tg">✈️ 客服</a>
            <a href="https://x.com/qunfangs" class="btn btn-x">𝕏 @qunfangs</a>
        </div>
    </div>

    <script>
        function downloadHtml() {
            var blob = new Blob([document.documentElement.outerHTML], {type: "text/html"});
            var a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = "群芳阁导航.html";
            a.click();
        }
    </script>
</body>
</html>
