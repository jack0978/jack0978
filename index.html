<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>终极防封发布页 - 群芳阁</title>
    <style>
        body {
            background-color: #0d0d0f;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* 强制单列上下排版的窄容器 */
        .vertical-container {
            background-color: #1c1c1f;
            border: 1px solid #333;
            border-radius: 16px;
            width: 100%;
            max-width: 480px; 
            padding: 40px 30px;
            box-sizing: border-box;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
        }

        .logo-area {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-area h1 {
            font-size: 26px;
            color: #ff5252;
            margin: 0 0 10px 0;
        }

        .logo-area p {
            color: #888;
            font-size: 14px;
            margin: 0;
            line-height: 1.6;
        }

        /* 上下堆叠的信息卡片 */
        .card-section {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }

        .info-card {
            background-color: #252529;
            padding: 18px;
            border-radius: 10px;
            font-size: 13.5px;
            line-height: 1.6;
            border-left: 4px solid #555;
        }

        .info-card.save { border-left-color: #ff9800; }
        .info-card.warn { border-left-color: #f44336; }
        .info-card.gift { border-left-color: #9c27b0; }
        .highlight { color: #ffeb3b; font-weight: bold; }

        /* 上下堆叠的按钮组 */
        .btn-stack {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .v-btn {
            display: block;
            width: 100%;
            padding: 16px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 15px;
            text-align: center;
            box-sizing: border-box;
            transition: transform 0.1s, opacity 0.2s;
            border: none;
            cursor: pointer;
        }

        .v-btn:hover { opacity: 0.9; }
        .v-btn:active { transform: scale(0.98); }
        
        .v-btn-save { background: #ff9800; color: #000; }
        .v-btn-main { background: linear-gradient(90deg, #ff416c 0%, #ff4b2b 100%); color: #fff; }
        
        /* 社交按钮网格，保持一行两个 */
        .social-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .s-btn {
            padding: 14px;
            border-radius: 8px;
            text-align: center;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            color: #fff;
        }

        .s-btn-tg { background-color: #2ca5e0; }
        .s-btn-x { background-color: #000000; border: 1px solid #444; }

        .footer {
            margin-top: 35px;
            text-align: center;
            color: #555;
            font-size: 12px;
        }
    </style>
</head>
<body>

    <div class="vertical-container">
        <!-- 头部区域 -->
        <div class="logo-area">
            <h1>🎉 终极防封基地 🎉</h1>
            <p>感谢下载本站 PikPak 资源<br>请妥善保存此页，作为最终回家指引</p>
        </div>

        <!-- 信息提示区 (上下排版) -->
        <div class="card-section">
            <div class="info-card save">
                💡 <b>一键保存：</b>建议点击下方按钮，将本页永久保存至本地。
            </div>
            <div class="info-card warn">
                🚫 <b>安全建议：</b>请务必连接代理，并在海外环境下使用 Chrome、Edge 等无审查浏览器访问主站。
            </div>
            <div class="info-card gift">
                🎁 <b>福利加成：</b>本站付费用户填写邀请码开通网盘会员后，找客服领5天会员。<br>
                PikPak 邀请码： <span class="highlight">52092816</span>
            </div>
        </div>

        <!-- 按钮通道区 (上下排版) -->
        <div class="btn-stack">
            <button onclick="downloadHtml()" class="v-btn v-btn-save">💾 一键保存本页防失联</button>
            <a href="https://vip.qunfangs.com" class="v-btn v-btn-main" target="_blank" rel="noopener noreferrer">🚀 极速主站直连通道</a>
            
            <!-- 移除了容易造成循环的“终极发布页”按钮，替换为社交媒体矩阵 -->
            <div class="social-grid">
                <a href="https://t.me/qunfangS" class="s-btn s-btn-tg" target="_blank" rel="noopener noreferrer">✈️ Telegram</a>
                <a href="https://x.com/qunfangs" class="s-btn s-btn-x" target="_blank" rel="noopener noreferrer">𝕏 @qunfangs</a>
            </div>
        </div>

        <!-- 底部 -->
        <div class="footer">
            © 2026 群芳阁 · 终极防失联阵地
        </div>
    </div>

    <script>
        function downloadHtml() {
            var htmlContent = document.documentElement.outerHTML;
            htmlContent = '<!DOCTYPE html>\n' + htmlContent;
            var blob = new Blob([htmlContent], {type: "text/html;charset=utf-8"});
            var url = URL.createObjectURL(blob);
            var a = document.createElement("a");
            a.href = url;
            a.download = "群芳阁_终极防失联导航.html";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            alert("✅ 保存成功！请在您的设备【下载】文件夹中查看。");
        }
    </script>
</body>
</html>
